server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service-auth
          uri: http://${USER_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/auth/**

        - id: user-service-users
          uri: http://${USER_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/users/**
          filters:
            - name: JwtAuthenticationFilter

        - id: product-service
          uri: http://${PRODUCT_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/products/**

        - id: order-service
          uri: http://${ORDER_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/orders/**
          filters:
            - name: JwtAuthenticationFilter

        - id: cart-service
          uri: http://${CART_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/api/cart/**
          filters:
            - name: JwtAuthenticationFilter

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
