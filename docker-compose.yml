version: '3.8'

services:

  # ── Databases ────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: shopwave-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shopwave
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - shopwave-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: shopwave-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - shopwave-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Microservices ────────────────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: shopwave-user-service
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=postgres
      - DB_NAME=shopwave
      - DB_USER=postgres
      - DB_PASS=password
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shopwave-network
    restart: on-failure

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: shopwave-product-service
    ports:
      - "8082:8082"
    environment:
      - MONGO_URI=mongodb://admin:password@mongodb:27017/shopwave_products?authSource=admin
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - shopwave-network
    restart: on-failure

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: shopwave-order-service
    ports:
      - "8083:8083"
    environment:
      - DB_HOST=postgres
      - DB_NAME=shopwave
      - DB_USER=postgres
      - DB_PASS=password
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shopwave-network
    restart: on-failure

  cart-service:
    build:
      context: ./cart-service
      dockerfile: Dockerfile
    container_name: shopwave-cart-service
    ports:
      - "8084:8084"
    environment:
      - MONGO_URI=mongodb://admin:password@mongodb:27017/shopwave_cart?authSource=admin
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - shopwave-network
    restart: on-failure

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: shopwave-api-gateway
    ports:
      - "8080:8080"
    environment:
      - USER_SERVICE_HOST=user-service
      - PRODUCT_SERVICE_HOST=product-service
      - ORDER_SERVICE_HOST=order-service
      - CART_SERVICE_HOST=cart-service
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      - user-service
      - product-service
      - order-service
      - cart-service
    networks:
      - shopwave-network
    restart: on-failure

volumes:
  postgres_data:
  mongo_data:

networks:
  shopwave-network:
    driver: bridge
